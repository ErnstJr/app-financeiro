<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>cadastro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">cadastro</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-card>
  <ion-card-header>
    <ion-card-title>Cadastro</ion-card-title>
  </ion-card-header>

  <ion-card-content>

    <ion-item>
      <ion-label>Nome:</ion-label>
      <ion-input [(ngModel)]="nome"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Tipo:</ion-label>
      <ion-input [(ngModel)]="tipo" placeholder="Física e Jurídica"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Endereço:</ion-label>
      <ion-input [(ngModel)]="endereco"></ion-input>
    </ion-item>

    <ion-button expand="block" (click)="cadastrar()">
      Cadastrar
    </ion-button>

    <ion-button expand="block" (click)="limparFormulario()">
      Limpar
    </ion-button>

  </ion-card-content>
</ion-card>

<ion-list>
  <ion-item *ngFor="let item of listaCadastros; let i = index">
    <ion-label>
      <h2>{{ item.nome }}</h2>
      <p>Tipo: {{ item.tipo }}</p>
      <p>Endereço: {{ item.endereco }}</p>
    </ion-label>

    <ion-button color="danger" (click)="excluir(i)">
      Excluir
    </ion-button>
  </ion-item>
</ion-list>
</ion-content>
